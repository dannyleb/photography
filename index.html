<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danny LeBlanc Photography</title>
  <meta name="description" content="Photography portfolio by Danny LeBlanc. Western, portrait, and lifestyle photography.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ═══════════════ HEADER ═══════════════ -->
  <header id="site-header">
    <div class="header-inner">
      <a href="index.html" class="wordmark">DANNY LEBLANC</a>
      <nav class="primary-nav">
        <a href="#western" class="nav-link">WESTERN</a>
        <a href="#portraits" class="nav-link">PORTRAITS</a>
        <a href="#lifestyle" class="nav-link">LIFESTYLE</a>
        <a href="about.html" class="nav-link">ABOUT</a>
        <a href="contact.html" class="nav-link">CONTACT</a>
      </nav>
      <button class="hamburger" aria-label="Menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- ═══════════════ MOBILE NAV ═══════════════ -->
  <div class="mobile-nav" aria-hidden="true">
    <button class="mobile-nav-close" aria-label="Close menu">&times;</button>
    <nav>
      <a href="#western">Western</a>
      <a href="#portraits">Portraits</a>
      <a href="#lifestyle">Lifestyle</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>

  <!-- ═══════════════ HERO ═══════════════ -->
  <section class="hero">
    <div class="hero-image-wrap">
      <img class="hero-img" src="images/hero/hero-main.jpg" alt="Cowgirls with horses at sunset in the desert">
    </div>
  </section>

  <!-- ═══════════════ WESTERN ═══════════════ -->
  <section id="western" class="gallery-section">
    <div class="section-header">
      <h2>Western</h2>
      <div class="section-rule"></div>
    </div>

    <div class="masonry-grid grid-3">
      <figure class="grid-item">
        <img src="images/equine/barn-embrace.jpg" alt="Woman and horse in intimate barn moment" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/equine/golden-saddles.jpg" alt="Woman framed between saddles at golden hour" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/equine/bareback-dusk.jpg" alt="Rider on horseback at dusk" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/equine/white-horse-gallop.jpg" alt="Rider galloping on white horse through desert" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/equine/cowgirl-laughing.jpg" alt="Cowgirl laughing with her horse" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/equine/riding-away.jpg" alt="Rider heading into golden sunset" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/equine/floral-dress.jpg" alt="Woman in floral dress walking with horse in field" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/equine/rider-smiling.jpg" alt="Blonde rider smiling on horseback" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/equine/paint-gallop.jpg" alt="Galloping on paint horse" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/equine/paint-standing.jpg" alt="Standing with paint horse" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/equine/paint-woods.jpg" alt="Riding through sun-dappled woods" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/equine/dark-horse-field.jpg" alt="Woman with dark horse in open field" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/equine/walking-field.jpg" alt="Walking with black horse through field" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/equine/two-riders.jpg" alt="Two riders galloping across open desert" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/equine/white-horse-smile.jpg" alt="Cowgirl smiling near white horse" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/equine/standing-together.jpg" alt="Standing together in open field" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/equine/white-horse-behind.jpg" alt="Peeking from behind white horse" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/equine/horseback-overcast.jpg" alt="Rider on overcast day" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/equine/buckskin-ride.jpg" alt="Woman riding buckskin horse" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/equine/forest-rider.jpg" alt="Rider in forest setting" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/equine/beside-buckskin.jpg" alt="Standing beside buckskin horse" loading="lazy">
      </figure>
      <!-- Western portraits -->
      <figure class="grid-item">
        <img src="images/portraits/cowgirl-trailer.jpg" alt="Cowgirl by horse trailer" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/portraits/rider-silhouette.jpg" alt="Rider silhouette at sunset" loading="lazy">
      </figure>
    </div>
  </section>

  <!-- ═══════════════ DIVIDER — THREE RIDERS ═══════════════ -->
  <div class="full-bleed" style="margin-top: 60px;">
    <img src="images/hero/divider-riders.jpg" alt="Three riders on a desert ridge at sunset" loading="lazy">
  </div>

  <!-- ═══════════════ PORTRAITS ═══════════════ -->
  <section id="portraits" class="gallery-section">
    <div class="section-header">
      <h2>Portraits</h2>
      <div class="section-rule"></div>
    </div>

    <div class="masonry-grid grid-3">
      <figure class="grid-item">
        <img src="images/portraits/fog-portrait.jpg" alt="Portrait in fog" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/portraits/kentucky-winds.jpg" alt="Portrait by the water" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/portraits/lakeside-blonde.jpg" alt="Lakeside portrait" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/portraits/wind-star.jpg" alt="Windblown portrait against star wall" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/portraits/blanket-detail.jpg" alt="Hand holding woven blanket" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/portraits/turquoise-portrait.jpg" alt="Portrait with turquoise jewelry" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/portraits/profile-hat.jpg" alt="Profile with western hat" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/portraits/feather-hat.jpg" alt="Portrait with feathered hat" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/portraits/hat-behind.jpg" alt="Turned away holding hat" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/equine/cowgirl-sunset.jpg" alt="Cowgirl silhouette at sunset" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/portraits/autumn-gaze.jpg" alt="Cowgirl gazing upward in autumn light" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/portraits/hat-tip.jpg" alt="Tipping cowboy hat against blue sky" loading="lazy">
      </figure>
    </div>
  </section>

  <!-- ═══════════════ DIVIDER — LAKE ═══════════════ -->
  <div class="full-bleed" style="margin-top: 60px;">
    <img src="images/hero/divider-lake.jpg" alt="Silhouette by the lake at dusk" loading="lazy">
  </div>

  <!-- ═══════════════ LIFESTYLE ═══════════════ -->
  <section id="lifestyle" class="gallery-section">
    <div class="section-header">
      <h2>Lifestyle</h2>
      <div class="section-rule"></div>
    </div>

    <div class="masonry-grid grid-3">
      <!-- Water -->
      <figure class="grid-item">
        <img src="images/water/dock-swimmer.jpg" alt="Swimming in misty lake from dock" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/water/lake-sunset.jpg" alt="Silhouette wading into lake at sunset" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/water/standing-lake.jpg" alt="Standing in lake water" loading="lazy">
      </figure>
      <!-- Moto -->
      <figure class="grid-item">
        <img src="images/moto/chopper-road.jpg" alt="Man on chopper on country road" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/moto/riding-headlight.jpg" alt="Riding motorcycle toward camera" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/moto/chopper-sitting.jpg" alt="Sitting on chopper in field" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/moto/motorcycle-portrait.jpg" alt="Portrait by motorcycle" loading="lazy">
      </figure>
      <!-- Other -->
      <figure class="grid-item">
        <img src="images/equine/buckskin-sky.jpg" alt="Riding buckskin against open sky" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/portraits/jacket-weeds.jpg" alt="Western jacket in tall grass" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/portraits/motel-cafe.jpg" alt="Motel cafe portrait" loading="lazy">
      </figure>
      <figure class="grid-item">
        <img src="images/portraits/phillips66.jpg" alt="Portrait at Phillips 66" loading="lazy">
      </figure>
    </div>
  </section>

  <!-- ═══════════════ FOOTER ═══════════════ -->
  <footer>
    <div class="footer-inner">
      <span class="footer-name">DANNY LEBLANC</span>
      <div class="footer-links">
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
      <span class="footer-copy">&copy; 2025</span>
    </div>
  </footer>

  <!-- ═══════════════ LIGHTBOX ═══════════════ -->
  <div id="lightbox" class="lightbox" aria-hidden="true">
    <button class="lightbox-close" aria-label="Close">&times;</button>
    <button class="lightbox-prev" aria-label="Previous">&larr;</button>
    <div class="lightbox-img-wrap">
      <img class="lightbox-img" src="" alt="">
    </div>
    <button class="lightbox-next" aria-label="Next">&rarr;</button>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
