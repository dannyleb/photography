  <header id="site-header">

  <main>

    <!-- HERO -->
    <section class="hero">
      <div class="hero-image-wrap">
        <!-- Replace hero/hero-01.jpg with your image -->
        <img
          src="images/hero/hero-01.jpg"
          alt="Featured photograph"
          class="hero-img"
          onerror="this.src='https://placehold.co/1600x900/1a1a1a/555555?text=hero-01.jpg'"
        />
      </div>
      <div class="hero-caption">
        <p class="hero-tagline"><em>light &amp; form</em></p>

    </section>

        <span class="section-rule"></span>

      <div class="masonry-grid grid-3">

          <img
            src="images/gallery/portraits/portrait-01.jpg"
            alt="Portrait 01"
            onerror="this.src='https://placehold.co/800x1200/1a1a1a/555555?text=portrait-01.jpg'"
            loading="lazy"
          />
        </figure>
        <figure class="grid-item">
          <img
            src="images/gallery/portraits/portrait-02.jpg"

            src="images/gallery/portraits/portrait-03.jpg"

            onerror="this.src='https://placehold.co/800x800/222222/555555?text=portrait-06.jpg'"
            loading="lazy"
          />
        </figure>
      </div>
    </section>

    <section class="full-bleed">
      <img
        src="images/hero/hero-02.jpg"
        alt="Featured photograph"
        onerror="this.src='https://placehold.co/1600x700/111111/555555?text=hero-02.jpg'"
